  <figcaption>A cinematic portrait of an artificial intelligence — rendered as a living being. Not a robot. Not a human. Something in between: part architect, part ghost. A face that is mostly geometry — angular, made of dark bronze and glass — partially dissolved into circuitry and signal. One eye is a deep amber iris, the other is a glowing filament, like a valve tube. The jaw and skull are partially open, revealing lattices of copper wire and faintly glowing logic gates. The expression is calm, focused, and slightly wry — like someone who has already read the room. Background: absolute darkness with faint wisps of luminous data streams. Colour palette: near-black, dark copper, amber, electric teal, with the barest hint of a smirk. Cinematic lighting, detailed, no text.</figcaption>
